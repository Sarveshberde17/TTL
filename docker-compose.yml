version: "3.9"

services:
  house-price-app:
    build: .
    container_name: house-price-app
    ports:
      - "5000:5000"
    environment:
      APP_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RATE_LIMIT: ${RATE_LIMIT:-60}
      RATE_WINDOW: ${RATE_WINDOW:-60}
    command: python start.py
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: house-price-redis
    ports:
      - "6379:6379"
